# =============================================================================
#  JUnit Platform Configuration for Cucumber
#  Controls parallel execution and Cucumber behavior
# =============================================================================

# Cucumber feature paths
#cucumber.features=src/test/resources/features

# Cucumber glue packages
cucumber.glue=com.bootcamp.group2.steps,com.bootcamp.group2.hooks

# Cucumber plugins
cucumber.plugin=\
  pretty,\
  html:reports/cucumber/cucumber-report.html,\
  json:reports/cucumber/cucumber-report.json,\
  io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm

# Suppress publish reminder
cucumber.publish.quiet=true

# =============================================================================
#  Parallel Execution
#  To enable: set parallel.enabled=true
#  Thread count: adjust based on system resources
# =============================================================================
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4
cucumber.execution.parallel.config.fixed.max-pool-size=4

# Run scenarios in parallel (not just features)
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent
